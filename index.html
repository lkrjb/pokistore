  };

  const categoriesList = [
    { name: "Photo & Video", icon: "fas fa-camera", appId: "lightroom" },
    { name: "Health & Fitness", icon: "fas fa-heartbeat", appId: "strava" },
    { name: "Productivity", icon: "fas fa-chart-line", appId: "todoist" },
    { name: "Entertainment", icon: "fas fa-film", appId: "netflix" },
    { name: "Action", icon: "fas fa-fist-raised", appId: "genshin" },
    { name: "Adventure", icon: "fas fa-mountain", appId: "genshin" },
    { name: "Puzzle", icon: "fas fa-puzzle-piece", appId: "genshin" },
    { name: "Indie", icon: "fas fa-gamepad", appId: "sneaky" }
  ];

  function renderStoreLogo() {
    const logoContainer = document.getElementById('storeLogo');
    if (!logoContainer) return;
    const config = STORE_LOGO_CONFIG;
    if (config.type === 'image' && config.value && config.value.trim() !== '') {
      logoContainer.innerHTML = `<img src="${config.value}" alt="Store Logo">`;
    } else if (config.type === 'icon' && config.value) {
      logoContainer.innerHTML = `<i class="${config.value}"></i>`;
    } else {
      logoContainer.innerHTML = `<i class="${config.fallbackIcon || 'fab fa-apple'}"></i>`;
    }
  }

  function renderAppIcon(app) {
    if (app.iconImage && app.iconImage.trim() !== '') {
      return `<img src="${app.iconImage}" alt="${app.name}" style="width:100%; height:100%; object-fit:cover;">`;
    } else if (app.iconClass) {
      return `<i class="${app.iconClass}" style="font-size:38px; color:white;"></i>`;
    } else {
      return `<i class="fas fa-mobile-alt" style="font-size:38px; color:white;"></i>`;
    }
  }

  function renderScreenshots(app) {
    if (!app.screenshots || app.screenshots.length === 0) return '';
    const items = app.screenshots.map((url, idx) => `<div class="screenshot-item"><img src="${url}" alt="Screenshot ${idx+1}" loading="lazy"></div>`).join('');
    return `<div class="screenshots"><h4>Preview</h4><div class="screenshot-scroll">${items}</div></div>`;
  }

  function renderCategories() {
    const grid = document.getElementById('categoriesGrid');
    if (!grid) return;
    grid.innerHTML = '';
    categoriesList.forEach(cat => {
      const chip = document.createElement('div');
      chip.className = 'category-chip';
      chip.innerHTML = `<i class="${cat.icon}"></i> ${cat.name}`;
      chip.addEventListener('click', () => {
        const appId = cat.appId;
        if (appId && appsDatabase[appId]) {
          renderAppCard(appsDatabase[appId]);
          document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        } else {
          showToast('Aplikasi untuk kategori ini sedang dalam pengembangan', true);
        }
      });
      grid.appendChild(chip);
    });
  }

  function renderAppCard(app) {
    const container = document.getElementById('dynamicCardContainer');
    if (!container) return;
    const starsHtml = generateStars(app.rating);
    const screenshotsHtml = renderScreenshots(app);
    const iconHtml = renderAppIcon(app);
    const cardHTML = `
      <div class="app-detail-card">
        <div class="app-header">
          <div class="app-icon" style="background: ${app.iconBg};">${iconHtml}</div>
          <div class="app-title-section">
            <div class="app-name">${app.name}</div>
            <div class="app-subtitle">${app.subtitle}</div>
            <div class="price-row">
              <div class="price-badge">${app.priceBadge}</div>
              <button class="download-btn" id="downloadAppBtn"><i class="fas fa-download"></i> Download</button>
            </div>
          </div>
        </div>
        <div class="rating-row">
          <div class="stars-container">${starsHtml}<span class="rating-number">${app.rating}</span></div>
          <div class="rating-count">${app.ratingCount}</div>
          <div class="badge-new">${app.badge}</div>
        </div>
        <div class="info-grid">
          <div class="info-item"><div class="info-label">AGES</div><div class="info-value">${app.age}</div></div>
          <div class="info-item"><div class="info-label">CATEGORY</div><div class="info-value">${app.category}</div></div>
          <div class="info-item"><div class="info-label">DEVELOPER</div><div class="info-value">${app.developer}</div></div>
          <div class="info-item"><div class="info-label">LANGUAGE</div><div class="info-value">${app.language}</div></div>
        </div>
        ${screenshotsHtml}
        <div class="about-section"><h4>Tentang Aplikasi Ini</h4><div class="app-description"><p>${app.description}</p></div></div>
        <div class="highlights">
          ${app.highlights.map(h => `<div class="highlight-item"><div class="highlight-icon"><i class="${h.icon}"></i></div><div class="highlight-text">${h.text}<small>${h.small}</small></div></div>`).join('')}
        </div>
      </div>
    `;
    container.innerHTML = cardHTML;
    const newDownloadBtn = document.getElementById('downloadAppBtn');
    if (newDownloadBtn) newDownloadBtn.addEventListener('click', handleDownload);
  }

  const tabData = {
    today: appsDatabase.tiktok,
    games: appsDatabase.genshin,
    apps: appsDatabase.notion,
    arcade: appsDatabase.sneaky
  };
  function renderCardByTab(tabId) { renderAppCard(tabData[tabId] || appsDatabase.tiktok); }

  function generateStars(rating) {
    let stars = '';
    for (let i = 1; i <= 5; i++) {
      if (i <= rating) stars += '<i class="fas fa-star"></i>';
      else if (i - 0.5 <= rating) stars += '<i class="fas fa-star-half-alt"></i>';
      else stars += '<i class="far fa-star"></i>';
    }
    return stars;
  }

  function isValidApkLink(url) {
    if (!url) return false;
    try { new URL(url); return true; } catch(e) { return false; }
  }

  function showToast(msg, isError = false) {
    let t = document.querySelector('.custom-toast');
    if (t) t.remove();
    let d = document.createElement('div');
    d.className = 'custom-toast';
    d.innerHTML = (isError ? '❌' : '✅') + ' ' + msg;
    document.body.appendChild(d);
    setTimeout(() => { d.style.opacity = '0'; setTimeout(() => d.remove(), 300); }, 3000);
  }

  function handleDownload(e) {
    e.preventDefault();
    if (!isValidApkLink(APK_DOWNLOAD_URL)) {
      showToast('Link APK tidak valid. Hubungi pengembang.', true);
      return;
    }
    const btn = e.currentTarget;
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processing...';
    btn.disabled = true;
    setTimeout(() => {
      window.open(APK_DOWNLOAD_URL, '_blank');
      btn.innerHTML = '<i class="fas fa-check-circle"></i> Download started';
      setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 2000);
      showToast('Download dimulai. Periksa folder unduhan Anda.', false);
    }, 500);
  }

  function initTabs() {
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        renderCardByTab(this.dataset.tab);
      });
    });
  }

  function initResetCategory() {
    const resetBtn = document.getElementById('resetCategoryBtn');
    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        const todayTab = document.querySelector('.tab-item[data-tab="today"]');
        if (todayTab) todayTab.click();
        else renderCardByTab('today');
      });
    }
  }
  

  renderStoreLogo();
  renderCategories();
  renderCardByTab('today');
  initTabs();
  initResetCategory();
</script>
</body>
</html>
